server:
  port: 9090

spring:
  application:
    name: cq-chat
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/cq?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

redis:
  sentinel:
    master-name: mymaster
    nodes: 127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381

jwt:
  secret: vue-spring-security-demo-1234567890abcdefghijklmn
  access-token-expire: 1800000

netty:
  port: 9090
  boss-threads: 1
  worker-threads: 4
  heartbeat-idle: 60
